server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: chengyiwaimai
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/chengyiwaimai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

chengyi:
  jwt-secret: ${JWT_SECRET:}
  jwt-access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:120}
  data-encryption-key: ${DATA_ENCRYPTION_KEY:${JWT_SECRET:}}
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
