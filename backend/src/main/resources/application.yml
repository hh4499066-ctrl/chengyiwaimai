server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: chengyiwaimai
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/chengyiwaimai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

chengyi:
  jwt-secret: ${JWT_SECRET:chengyi-waimai-local-demo-secret-2026-change-in-prod}
  jwt-access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:120}
  data-encryption-key: ${DATA_ENCRYPTION_KEY:${JWT_SECRET:chengyi-waimai-local-demo-secret-2026-change-in-prod}}
  require-secure-secrets: ${REQUIRE_SECURE_SECRETS:false}
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
